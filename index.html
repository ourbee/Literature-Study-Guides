<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Literature Study Guides</title>

<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    font-family: Georgia, 'Times New Roman', serif;

    background: #faf8f5;

    color: #2b2420;

    min-height: 100vh;

    display: flex;

    align-items: center;

    justify-content: center;

    padding: 40px 20px;

  }

  .container { max-width: 720px; width: 100%; }

  h1 {

    font-size: 2.4rem;

    font-weight: 400;

    letter-spacing: 0.5px;

    margin-bottom: 8px;

    color: #1a1512;

  }

  .subtitle {

    font-family: Arial, sans-serif;

    font-size: 1rem;

    color: #7a7168;

    margin-bottom: 40px;

  }

  .guide-list {

    list-style: none;

  }

  .guide-list li {

    border-top: 1px solid #e3ddd3;

  }

  .guide-list li:last-child {

    border-bottom: 1px solid #e3ddd3;

  }

  .guide-list a {

    display: flex;

    align-items: center;

    justify-content: space-between;

    padding: 22px 8px;

    text-decoration: none;

    color: #2b2420;

    transition: background 0.15s ease, padding-left 0.15s ease;

  }

  .guide-list a:hover {

    background: #f1ece2;

    padding-left: 16px;

  }

  .guide-title {

    font-size: 1.15rem;

  }

  .arrow {

    font-family: Arial, sans-serif;

    font-size: 1.1rem;

    color: #b8ac9a;

  }

  footer {

    margin-top: 48px;

    font-family: Arial, sans-serif;

    font-size: 0.8rem;

    color: #a89e91;

    text-align: center;

  }

</style>

</head>

<body>

  <div class="container">

    <h1>Literature Study Guides</h1>

    <p class="subtitle">A collection of presentations and study materials</p>

    <ul class="guide-list">

      <li>

        <a href="victorian-poetry/">

          <span class="guide-title">Victorian Poetry</span>

          <span class="arrow">&rarr;</span>

        </a>

      </li>

      <li>

        <a href="i-have-a-dream/">

          <span class="guide-title">I Have a Dream</span>

          <span class="arrow">&rarr;</span>

        </a>

      </li>

    </ul>

    <footer>Updated July 2026</footer>

  </div>

</body>

</html>
